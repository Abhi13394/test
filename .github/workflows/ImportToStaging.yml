name: Quadient Staging Import
 
on:
  push:
    branches: [ main ]        # triggers on push
  workflow_dispatch:           # allows manual trigger from GitHub UI
  
 
jobs:
  deploy:
    runs-on: [self-hosted, dev1]       # targets your local runner
    environment: fopdev
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
 
      - name: Run CMD snapshot script
        shell: cmd
        run: |
          scripts\snapshot.bat

      - name: Map network path
        shell: powershell
        env:
          NET_PASSWORD: ${{ secrets.foppassword }}
          NET_USER: ${{ secrets.fopuser }}
        run: |
          net use \\18.144.54.120\Storagefop /user:$env:NET_USER $env:NET_PASSWORD

      - name: Run PowerShell Import script
        shell: powershell
        run: |
          .\scripts\Import.ps1
